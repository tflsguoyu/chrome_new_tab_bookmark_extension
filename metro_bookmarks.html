<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Metro Bookmarks</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #191b20;
      --panel-2: #20232a;
      --text: #f4f6fb;
      --muted: #a9afbd;
      --line: rgba(255,255,255,.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(0, 169, 157, .12), transparent 34%),
        linear-gradient(310deg, rgba(240, 93, 35, .12), transparent 38%),
        var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    .app {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      background: rgba(16, 17, 20, .78);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(2, 13px);
      grid-template-rows: repeat(2, 13px);
      gap: 3px;
      width: 32px;
      height: 32px;
    }

    .logo span:nth-child(1) { background: #00a99d; }
    .logo span:nth-child(2) { background: #f05d23; }
    .logo span:nth-child(3) { background: #f5b700; }
    .logo span:nth-child(4) { background: #6c63ff; }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .search {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .search:focus {
      border-color: rgba(0,169,157,.75);
      box-shadow: 0 0 0 3px rgba(0,169,157,.16);
    }

    .density-buttons {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
      background: var(--panel);
    }

    .density-buttons button,
    .nav button {
      border: 0;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .density-buttons button {
      display: grid;
      place-items: center;
      width: 36px;
      height: 40px;
      padding: 0;
      background: transparent;
      color: var(--muted);
    }

    .density-buttons button + button { border-left: 1px solid var(--line); }
    .density-buttons button.active { background: #00a99d; color: #071412; }

    .density-icon {
      display: grid;
      gap: 2px;
      width: 18px;
      height: 18px;
    }

    .density-icon span {
      background: currentColor;
      opacity: .95;
    }

    .density-icon.compact {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    .density-icon.standard {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .density-icon.roomy {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      padding: 2px;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav button {
      border: 0;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .category-row {
      display: grid;
      align-items: center;
      gap: 10px;
      width: 100%;
      border-radius: 4px;
      background: transparent;
      text-align: left;
    }

    .category-row {
      grid-template-columns: 10px minmax(0, 1fr) auto;
      padding: 10px 10px;
    }

    .category-row:hover,
    .category-row.active {
      background: var(--panel-2);
    }

    .drop-target {
      outline: 1px dashed transparent;
      outline-offset: -3px;
    }

    .drop-target.drop-over {
      background: rgba(0,169,157,.18);
      outline-color: rgba(0,169,157,.9);
      color: var(--text);
    }

    .dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
    }

    .count {
      color: var(--muted);
      font-size: 12px;
    }

    main {
      min-width: 0;
      min-height: 100vh;
      padding: 18px;
    }

    .groups {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      align-items: flex-start;
      gap: 24px;
      width: 100%;
      background: transparent;
      border: 0;
    }

    .group {
      display: block;
      min-width: 0;
    }

    .tiles {
      display: grid;
      grid-auto-flow: dense;
      gap: 8px;
      align-items: start;
      justify-content: start;
      background: transparent;
    }

    .tile {
      position: relative;
      min-width: 0;
      display: grid;
      aspect-ratio: 1;
      background:
        linear-gradient(145deg, rgba(255,255,255,.12), transparent 42%),
        color-mix(in srgb, var(--accent), #17191d 26%);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .14s ease, filter .14s ease, border-color .14s ease;
    }

    .tile:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      border-color: rgba(255,255,255,.16);
    }

    .tile.dragging {
      opacity: .55;
      transform: scale(.98);
    }

    .tile.drop-before,
    .tile.drop-after {
      overflow: visible;
      z-index: 2;
    }

    .tile.drop-before {
      box-shadow: -4px 0 0 #7fcfc5, inset 0 1px 0 rgba(255,255,255,.08);
    }

    .tile.drop-after {
      box-shadow: 4px 0 0 #7fcfc5, inset 0 1px 0 rgba(255,255,255,.08);
    }

    .tile-link {
      display: grid;
      align-items: center;
      justify-items: center;
      min-width: 0;
      width: 100%;
      height: 100%;
      padding: 8px;
      text-align: center;
    }

    .delete-tile {
      position: absolute;
      top: 6px;
      right: 6px;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      background: rgba(0,0,0,.24);
      color: rgba(255,255,255,.9);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity .12s ease, background .12s ease;
    }

    .tile:hover .delete-tile,
    .delete-tile:focus-visible {
      opacity: 1;
    }

    .delete-tile:hover {
      background: rgba(0,0,0,.42);
    }

    .title {
      display: block;
      margin-top: 0;
      color: #fff;
      font-size: 11px;
      font-weight: 760;
      line-height: 1.12;
      overflow: hidden;
      white-space: nowrap;
      max-width: 100%;
      width: 100%;
      text-shadow: 0 1px 2px rgba(0,0,0,.24);
      text-align: center;
    }

    .title-text {
      display: inline-block;
      max-width: 100%;
      vertical-align: top;
    }

    .title.is-overflow {
      text-align: left;
    }

    .title.is-overflow .title-text {
      max-width: none;
      padding-right: 14px;
      animation: title-slide 5.5s ease-in-out infinite alternate;
    }

    .title.is-editing {
      overflow: visible;
      text-align: center;
    }

    .title.is-editing .title-text {
      max-width: 100%;
      min-width: 24px;
      padding: 2px 4px;
      border-radius: 4px;
      background: rgba(0,0,0,.28);
      outline: 1px solid rgba(255,255,255,.38);
      animation: none;
      cursor: text;
    }

    @keyframes title-slide {
      from { transform: translateX(0); }
      to { transform: translateX(calc(var(--title-shift, 0px) * -1)); }
    }

    .favicon {
      display: block;
      width: 34px;
      height: 34px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.28));
    }

    .initial:not(.has-icon) .favicon,
    .favicon.is-hidden {
      display: none;
    }

    .initial {
      grid-row: 1;
      display: grid;
      grid-template-rows: auto auto;
      align-content: center;
      place-items: center;
      gap: 6px;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: transparent;
      color: #fff;
      padding: 9px 8px 8px;
    }

    .empty {
      padding: 42px 0;
      color: var(--muted);
      font-size: 15px;
    }

    @media (max-width: 850px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        padding: 16px;
      }
      .nav {
        grid-auto-flow: column;
        grid-auto-columns: max-content;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .nav button { width: auto; min-width: 150px; }
      main { padding-top: 18px; }
      .groups { gap: 18px; }
    }

    @media (max-width: 520px) {
      .groups { gap: 14px; }
      .tiles {
        --tile-min: 82px;
        grid-template-columns: repeat(var(--mobile-columns, 3), var(--tile-min)) !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <div>
          <h1>Bookmarks</h1>
          <p class="meta" id="meta">Metro tiles</p>
        </div>
      </div>

      <div class="search-row">
        <input class="search" id="search" type="search" placeholder="Search title, domain, or category" autocomplete="off">
        <div class="density-buttons" aria-label="Tile size">
          <button type="button" data-density="compact" title="Compact" aria-label="Compact tiles">
            <span class="density-icon compact" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></span>
          </button>
          <button type="button" data-density="normal" class="active" title="Standard" aria-label="Standard tiles">
            <span class="density-icon standard" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
          </button>
          <button type="button" data-density="roomy" title="Roomy" aria-label="Roomy tiles">
            <span class="density-icon roomy" aria-hidden="true"><span></span></span>
          </button>
        </div>
      </div>

      <nav class="nav" id="categoryNav" aria-label="Bookmark categories"></nav>
    </aside>

    <main>
      <div class="groups" id="groups"></div>
    </main>
  </div>

  <script src="metro_bookmarks_app.js"></script>
</body>
</html>
